<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Commander · Afreldo</title>
    <!-- modern font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Inter", 'Segoe UI', sans-serif;
            min-height: 100vh;
            color: #e0e0e0;
            position: relative;
            background: #0b0b0b;
        }

        /* Modern monochrome animated background — subtle grid & noise */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #2c2c2c 0%, #0a0a0a 90%);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        /* smooth glow */
        @keyframes softBorderPulse {
            0% { border-color: #3a3a3a; box-shadow: 0 8px 20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02); }
            50% { border-color: #6a6a6a; box-shadow: 0 8px 25px rgba(255,255,255,0.03), 0 0 0 1px rgba(255,255,255,0.08); }
            100% { border-color: #3a3a3a; box-shadow: 0 8px 20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02); }
        }

        @keyframes textPulse {
            0% { opacity: 0.9; text-shadow: 0 0 5px rgba(255,255,255,0.1); }
            50% { opacity: 1; text-shadow: 0 0 12px rgba(255,255,255,0.25); }
            100% { opacity: 0.9; text-shadow: 0 0 5px rgba(255,255,255,0.1); }
        }

        .container {
            max-width: 1240px;
            margin: 0 auto;
            padding: 24px 24px;
            position: relative;
            z-index: 2;
        }
        
        /* header modern */
        header {
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 14px 0;
            margin-bottom: 32px;
            border: 1px solid #3e3e3e;
            border-radius: 40px;
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.7);
            transition: border 0.2s;
        }
        
        .header-content {
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #f5f5f5;
            background: linear-gradient(135deg, #e0e0e0, #b0b0b0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        nav ul {
            display: flex;
            list-style: none;
            gap: 28px;
            flex-wrap: wrap;
        }
        
        nav ul li a {
            text-decoration: none;
            color: #bbb;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            padding: 6px 2px;
            border-bottom: 2px solid transparent;
        }
        
        nav ul li a:hover {
            color: #fff;
            border-bottom: 2px solid #aaa;
            transform: translateY(-1px);
        }
        
        /* main card */
        .main-content {
            background: rgba(14, 14, 14, 0.7);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 36px;
            padding: 36px 32px;
            border: 1px solid #4a4a4a;
            box-shadow: 0 25px 40px -12px #000000cc, inset 0 0 0 1px rgba(255,255,255,0.02);
            animation: softBorderPulse 8s infinite ease-in-out;
        }
        
        .page-title {
            font-size: 2.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            color: #f0f0f0;
            display: inline-block;
            border-bottom: 3px solid #7e7e7e;
            padding-bottom: 8px;
        }
        
        .description {
            color: #aaa;
            margin-bottom: 32px;
            font-size: 1rem;
            font-weight: 400;
        }
        
        /* Form elements modern */
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #c0c0c0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        input, textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(20, 20, 20, 0.9);
            border: 1.5px solid #4b4b4b;
            border-radius: 20px;
            font-size: 0.95rem;
            transition: all 0.25s;
            color: #f0f0f0;
            font-family: "Inter", monospace;
            backdrop-filter: blur(5px);
        }
        
        input:focus, textarea:focus {
            outline: none;
            background: #1f1f1f;
            border-color: #b0b0b0;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.03), 0 0 20px rgba(255,255,255,0.05);
        }
        
        input::placeholder, textarea::placeholder {
            color: #6a6a6a;
        }
        
        .row {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
        }
        
        .col {
            flex: 1;
        }
        
        /* Buttons */
        .btn {
            background: #1e1e1e;
            color: #eaeaea;
            font-weight: 600;
            border: 1.5px solid #6a6a6a;
            padding: 16px 28px;
            border-radius: 48px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            width: 100%;
            margin: 12px 0 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            backdrop-filter: blur(8px);
            box-shadow: 0 6px 10px rgba(0,0,0,0.5);
        }
        
        .btn:hover {
            background: #2d2d2d;
            border-color: #bdbdbd;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 18px 25px -8px #000, 0 0 0 1px rgba(255,255,255,0.05);
        }
        
        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.5);
        }

        #stopBtn {
            background: #2a1e1e;
            border-color: #7a5a5a;
            color: #ffd0d0;
        }
        #stopBtn:hover {
            background: #3e2626;
            border-color: #c97a7a;
        }
        
        /* Log section modern */
        .log-section {
            margin-top: 36px;
            border-top: 1.5px solid #3e3e3e;
            padding-top: 24px;
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .log-title {
            font-weight: 600;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ddd;
        }
        
        .log-actions {
            display: flex;
            gap: 12px;
        }
        
        .log-btn {
            background: rgba(40, 40, 40, 0.7);
            border: 1.5px solid #5e5e5e;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: #ccc;
            backdrop-filter: blur(8px);
        }
        
        .log-btn:hover {
            background: #3a3a3a;
            border-color: #aaa;
            color: white;
        }
        
        .log-container {
            background: rgba(8, 8, 8, 0.75);
            backdrop-filter: blur(10px);
            color: #d0d0d0;
            padding: 18px 20px;
            border-radius: 24px;
            min-height: 220px;
            max-height: 320px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            border: 1px solid #4a4a4a;
            box-shadow: inset 0 8px 12px rgba(0,0,0,0.5);
        }
        
        .log-entry {
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(180,180,180,0.08);
        }
        
        .log-success { color: #b0b0b0; }
        .log-error { color: #ff8a8a; }
        .log-info { color: #c5c5c5; }
        .log-warning { color: #e5c07b; }
        .timestamp { color: #6b6b6b; margin-right: 12px; font-weight: 400; }
        
        /* stats cards */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            background: rgba(20, 20, 20, 0.5);
            backdrop-filter: blur(8px);
            padding: 20px 16px;
            border-radius: 28px;
            border: 1px solid #4c4c4c;
        }
        
        .stat-item {
            flex: 1;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2.4rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #ffffff;
            letter-spacing: -0.02em;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        
        .progress-container {
            background: #1b1b1b;
            border-radius: 60px;
            height: 10px;
            margin: 20px 0 10px;
            overflow: hidden;
            border: 1px solid #555;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #aaa, #eee, #ccc);
            width: 0%;
            transition: width 0.2s;
            box-shadow: 0 0 10px #ffffff55;
        }
        
        footer {
            text-align: center;
            padding: 28px 20px 10px;
            color: #8a8a8a;
            font-size: 0.9rem;
        }
        
        footer a {
            color: #ddd;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dotted #777;
        }
        
        footer a:hover {
            color: white;
            border-bottom: 1px solid white;
        }
        
        /* modern scroll */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1c1c1c; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #5a5a5a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #8a8a8a; }
        
        @media (max-width: 700px) {
            .header-content { flex-direction: column; gap: 12px; }
            .row { flex-direction: column; gap: 16px; }
            .page-title { font-size: 2rem; }
            .main-content { padding: 28px 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">◼ AFRELDO · WEBHOOK ◻</div>
            <nav>
                <ul>
                    <li><a href="https://discord.gg/BDZhfx6AVh" target="_blank" style="font-weight: 600;">💬 Join Discord</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <div class="container">
        <div class="main-content">
            <h1 class="page-title">Spam Webhook</h1>
            <div class="description">Gunakan dengan bijak · by Afreldo</div>
            
            <form id="spamForm">
                <div class="form-group">
                    <label>🔗 Webhook URL</label>
                    <input type="url" id="webhookUrl" placeholder="https://discord.com/api/webhooks/..." required="">
                </div>
                
                <div class="form-group">
                    <label>💬 Konten Pesan</label>
                    <textarea id="message" placeholder="Tulis sesuatu..." required="">@everyone AFRELDO WAS HERE</textarea>
                </div>
                
                <div class="row">
                    <div class="col">
                        <label>🔢 Jumlah Kirim</label>
                        <input type="number" id="amount" min="1" max="100" value="10" required="">
                    </div>
                    <div class="col">
                        <label>⏱️ Jeda (ms)</label>
                        <input type="number" id="delay" min="0" max="5000" value="500">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>📎 Lampiran (opsional)</label>
                    <input type="file" id="attachment">
                </div>
                
                <div class="stats" id="stats" style="display: none;">
                    <div class="stat-item">
                        <div class="stat-value" id="sentCount">0</div>
                        <div class="stat-label">Terkirim</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="failedCount">0</div>
                        <div class="stat-label">Gagal</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="successRate">0%</div>
                        <div class="stat-label">Sukses</div>
                    </div>
                </div>
                
                <div class="progress-container" id="progressContainer" style="display: none;">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                
                <button type="button" class="btn" id="startBtn" onclick="startSpam()">🚀 Eksekusi</button>
                <button type="button" class="btn" id="stopBtn" onclick="stopSpam()" style="display: none;">⏹ Hentikan</button>
            </form>
            
            <div class="log-section">
                <div class="log-header">
                    <div class="log-title">📋 Log Aktivitas</div>
                    <div class="log-actions">
                        <button class="log-btn" onclick="clearLog()">Bersihkan</button>
                        <button class="log-btn" onclick="copyLog()">Salin</button>
                    </div>
                </div>
                <div class="log-container" id="logContainer">
                    <div class="log-entry log-info"><span class="timestamp">[00:00:00]</span> ◻ Sistem siap</div>
                    <div class="log-entry log-info"><span class="timestamp">[05:15:06]</span> ◼ Afreldo online</div>
                </div>
            </div>
        </div>
        
        <footer>
            <p> © <a href="https://discord.gg/BDZhfx6AVh" target="_blank">Afreldo</a> · Community</p>
        </footer>
    </div>
    
    <script>
        (function() {
            // State
            let isSpamming = false;
            let sentCount = 0;
            let failedCount = 0;
            let totalMessages = 0;
            let abortController = null;
            
            const webhookUrl = document.getElementById('webhookUrl');
            const message = document.getElementById('message');
            const amount = document.getElementById('amount');
            const delay = document.getElementById('delay');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const logContainer = document.getElementById('logContainer');
            const stats = document.getElementById('stats');
            const sentCountEl = document.getElementById('sentCount');
            const failedCountEl = document.getElementById('failedCount');
            const successRateEl = document.getElementById('successRate');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');

            function addLog(msg, type = 'info') {
                const entry = document.createElement('div');
                entry.className = `log-entry log-${type}`;
                const now = new Date();
                const ts = `[${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}]`;
                entry.innerHTML = `<span class="timestamp">${ts}</span> ${msg}`;
                logContainer.appendChild(entry);
                logContainer.scrollTop = logContainer.scrollHeight;
                while (logContainer.children.length > 50) logContainer.removeChild(logContainer.firstChild);
            }

            window.clearLog = function() {
                logContainer.innerHTML = '';
                addLog('◻ Log dibersihkan', 'info');
            };

            window.copyLog = function() {
                let txt = '';
                for (let c of logContainer.children) txt += c.textContent + '\n';
                navigator.clipboard?.writeText(txt).then(() => alert('📋 Log disalin!')).catch(() => alert('Gagal menyalin'));
            };

            function updateStats() {
                sentCountEl.textContent = sentCount;
                failedCountEl.textContent = failedCount;
                const total = sentCount + failedCount;
                const rate = total > 0 ? Math.round((sentCount / total) * 100) : 0;
                successRateEl.textContent = rate + '%';
                if (totalMessages > 0) {
                    progressBar.style.width = Math.min((total / totalMessages) * 100, 100) + '%';
                }
            }

            const sleep = (ms) => new Promise(r => setTimeout(r, ms));

            window.stopSpam = function() {
                if (abortController) abortController.abort();
                isSpamming = false;
                startBtn.style.display = 'block';
                stopBtn.style.display = 'none';
                addLog('⚠️ Proses dihentikan', 'warning');
            };

            window.startSpam = async function() {
                const url = webhookUrl.value.trim();
                if (!url) return addLog('❌ URL Webhook belum diisi', 'error');
                const msg = message.value.trim();
                if (!msg) return addLog('❌ Pesan tidak boleh kosong', 'error');
                
                totalMessages = parseInt(amount.value) || 10;
                const delayMs = parseInt(delay.value) || 500;
                sentCount = failedCount = 0;
                isSpamming = true;
                
                startBtn.style.display = 'none';
                stopBtn.style.display = 'block';
                stats.style.display = 'flex';
                progressContainer.style.display = 'block';
                progressBar.style.width = '0%';
                updateStats();
                
                addLog(`🚀 Mulai pengiriman · target ${totalMessages} · jeda ${delayMs}ms`, 'info');
                abortController = new AbortController();
                
                for (let i = 0; i < totalMessages && isSpamming; i++) {
                    try {
                        let content = msg;
                        if (i % 3 === 0) content += ' 🔥';
                        else if (i % 3 === 1) content += ' ⚡';
                        
                        const resp = await fetch(url, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ content }),
                            signal: abortController.signal
                        });
                        
                        if (resp.ok) {
                            sentCount++;
                            if (i % 5 === 0 || i === totalMessages-1) addLog(`✅ ${i+1}/${totalMessages} berhasil`, 'success');
                        } else {
                            failedCount++;
                            addLog(`❌ ${i+1} gagal (${resp.status})`, 'error');
                            if (resp.status === 429) {
                                const retry = resp.headers.get('Retry-After') || 5;
                                addLog(`⏳ Rate limit, tunggu ${retry}s`, 'warning');
                                await sleep(retry * 1000);
                            }
                        }
                    } catch (e) {
                        if (e.name === 'AbortError') break;
                        failedCount++;
                        addLog(`❌ Error: ${e.message}`, 'error');
                    }
                    updateStats();
                    if (i < totalMessages-1 && isSpamming && delayMs > 0) await sleep(delayMs);
                }
                
                if (isSpamming) addLog(`✅ Selesai. ${sentCount} sukses, ${failedCount} gagal`, 'success');
                startBtn.style.display = 'block';
                stopBtn.style.display = 'none';
                isSpamming = false;
            };

            window.onload = function() {
                const p = new URLSearchParams(window.location.search).get('url');
                if (p) webhookUrl.value = p;
                addLog('◼ Afreldo · beraksi awowako', 'info');
            };
        })();
    </script>
</body></html>
