<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran UCP - Afreldo Community</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-container {
            background: #252525;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
            border-top: 4px solid #ff4b4b;
        }
        h2 { margin-bottom: 20px; color: #ff4b4b; }
        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }
        label { display: block; margin-bottom: 5px; font-size: 14px; }
        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
        }
        input:focus { border-color: #ff4b4b; outline: none; }
        button {
            width: 100%;
            padding: 12px;
            background: #ff4b4b;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #ff2222; }
        .info {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }
        .server-ip {
            background: #111;
            padding: 5px;
            display: inline-block;
            margin-top: 10px;
            color: #00ff00;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2>AFRELDO UCP</h2>
    <p>Silakan daftar untuk bermain di server</p>
    
    <form action="proses_daftar.php" method="POST">
        <div class="input-group">
            <label>Nama UCP</label>
            <input type="text" name="ucp_name" placeholder="Contoh: Afreldo_Ganteng" required>
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Masukkan password" required>
        </div>

        <button type="submit">DAFTAR SEKARANG</button>
    </form>

    <div class="info">
        Setelah daftar, silakan login di SAMP:<br>
        <span class="server-ip">IP: 188.165.192.24:9285</span>
        <p>Ganti Nama di SAMP Client sesuai Nama UCP di atas.</p>
    </div>
</div>

</body>
</html>
